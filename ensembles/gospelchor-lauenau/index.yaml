description: >
  »The Happy People« ist der Gospelchor aus Lauenau, der von Gospel bis Pop alles singt.
  Die Sängerinnen und Sänger treten neben eigenen Konzerten auch auf Hochzeiten und anderen
  festlichen Anlässen auf. Neue Mitglieder sind ausdrücklich willkommen –
  Notenkenntnisse sind keine Voraussetzung. Der Spaß am Singen ist ansteckend!

