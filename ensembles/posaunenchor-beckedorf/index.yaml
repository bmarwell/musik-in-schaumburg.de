description: |
  Der Posaunenchor Beckedorf ist eines der traditionsreichsten Ensembles in Schaumburg 
  und feierte 2019 bereits sein 125-jähriges Jubiläum. 
  Gegründet im Kontext der Missionsfestbewegung, gestaltet der Chor seit Generationen Gottesdienste 
  und kirchliche Feiern der Kirchengemeinde musikalisch mit – von festlich bis besinnlich. 
  Mit Trompeten, Hörnern, Posaunen und Tuben bereichert er das kirchliche Leben und ist eine feste, 
  klangvolle Säule der Gemeinde.
  Unter der Leitung von Olaf Dziemba und Matthias Natzel probt der Chor mittwochs von 19:30 bis 21:30 Uhr 
  in der Pfarrscheune und freut sich über neue Bläserinnen und Bläser jeden Alters, 
  die Lust auf gemeinsames Musizieren haben.
  Der Posaunenchor Beckedorf ist eine lebendige Gemeinschaft, 
  die Gottesdienste feierlicher macht und den Menschen zur Freude erklingt.

