title: "Posaunenchor Lindhorst – St. Dionysius"
type: posaunenchor
slug: posaunenchor-lindhorst
status: active

description: |
  Der Posaunenchor der Ev.-Luth. Kirchengemeinde Lindhorst probt wöchentlich donnerstags im Gemeindehaus.
  Für Anfängerinnen und Anfänger gibt es ab 17:00 Uhr einen eigenen Kurs, 
  die Jungbläsergruppe probt ab 19:00 Uhr, der Hauptchor ab 20:00 Uhr. 
  Neue Anfängerkurse starten regelmäßig, Kurse und Instrumente werden kostenlos bereitgestellt.

