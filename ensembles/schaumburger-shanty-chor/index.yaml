description: |
  Der Schaumburger Shanty-Chor wurde 1989 in Sachsenhagen gegründet 
  und ist durch die Nähe zum Steinhuder Meer fest mit der maritimen Tradition verwurzelt. 
  Unter der langjährigen Leitung des Musiklehrers Igor Tomanoski 
  präsentiert das Ensemble klassische Shantys und Seemannslieder 
  mit aktuell etwa zwanzig Sängern und zwei Instrumentalisten. 
  Der Chor ist überregional gut vernetzt und pflegt 
  intensive Freundschaften zu Ensembles in ganz Deutschland 
  sowie in den Niederlanden. Die Auftritte führen die „Sachsenhäger Jungs“ 
  regelmäßig zu großen Shanty-Festivals und 
  Traditionsveranstaltungen wie den Mindener Hafenkonzerten. 
  Seit über 35 Jahren leistet der Verein damit einen wichtigen Beitrag 
  zur Pflege des maritimen Liedgutes im Landkreis Schaumburg.

