description: >
  »Joy to Sing« ist der Gemeindechor der Kirche Steinbergen unter Leitung von Julia Knubbe.
  Das Repertoire reicht von geistlicher Musik bis zu modernen Chorarrangements.
  Neue Sängerinnen und Sänger sind stets willkommen – eine kostenlose Probestunde
  ist nach Absprache möglich.

