description: >
  Das Sinfonieorchester der Schaumburger Landschaft ist das einzige Ensemble
  in Niedersachsen, das von einem Landschaftsverband getragen wird. Seit seiner
  Gründung 1994 erarbeitet das Ensemble mit rund 60 Musikerinnen und Musikern
  unter Leitung von Siegfried Westphal jährlich ein anspruchsvolles klassisches
  Programm. Hauptspielstätte ist die St.-Martini-Kirche Stadthagen; darüber
  hinaus gastiert das Ensemble in historischen Spielstätten der gesamten Region
  Schaumburg.

