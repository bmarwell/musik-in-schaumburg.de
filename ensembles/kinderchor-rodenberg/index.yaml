description: >
  Der Kinderchor Rodenberg unter Leitung von Julia Knubbe richtet sich an alle Kinder
  von 6 bis 7 Jahren. In einer spielerischen und fröhlichen Atmosphäre lernen die Kinder
  gemeinsam zu singen. Zwei kostenlose Probestunden zum Kennenlernen sind möglich –
  einfach anmelden und vorbeikommen!

