description: >
  Der Männerchor »Liederkranz« Enzen-Hobbensen wurde am 4. März 1898 von elf
  Männern aus dem Dorf gegründet und zählt heute zu den leistungsstärksten
  Männerchören im Landkreis Schaumburg. Der Chor pflegt ein vielseitiges
  Repertoire aus traditionellem und modernem Liedgut und tritt regelmäßig bei
  Konzerten und Veranstaltungen in der Region auf. 2023 feierte der Verein
  sein 125-jähriges Bestehen.

