description: >
  „kreuz & quer" wurde 1995 vom damaligen Pastor Hartmut Spier und Mathias Goedecke
  in Probsthagen ins Leben gerufen. Der Chor besteht aus rund 40 Sängerinnen und Sängern,
  die kreuz und quer aus vielen Teilen Schaumburgs kommen. Im Mittelpunkt steht christliche
  Botschaft durch Musik – der Schwerpunkt des Repertoires liegt auf Spirituals und Gospels,
  ergänzt durch Pop, Musical, Taizé-Gesänge sowie afrikanische und moderne Kirchenlieder.
  Begleitet wird der Chor regelmäßig von einer eigenen Band.

