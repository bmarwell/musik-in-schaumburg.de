description: |
  Der Posaunenchor Heuerßen blickt auf eine beeindruckende 70-jährige Geschichte zurück.
  Gegründet 1953 unter der Leitung von Heinrich Heinemann,
  ist er seitdem ein fester und klangvoller Bestandteil des kirchlichen und kulturellen Lebens 
  in der St. Jürgen-Gemeinde. Mit Trompeten, Hörnern, Posaunen und Tuben gestaltet
  der Chor Gottesdienste, Festlichkeiten und Konzerte – von besinnlich bis festlich.
  Was den Chor besonders ausmacht, ist die enge Gemeinschaft: 
  Musizieren mit Freunden, gemeinsame Ausflüge, Freude, Lachen und das Teilen 
  von Lebensmomenten – alles eingebettet in die Musik, die zum Lobe Gottes und den 
  Menschen zur Freude erklingt.


