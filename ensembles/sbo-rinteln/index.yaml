description: >
  Das Symphonische Blasorchester der Stadt Rinteln informiert auf seiner Website über das
  Vereinsleben und seine Konzerte. Geleitet von Thomas Lück probt das Ensemble mittwochs
  außerhalb der niedersächsischen Ferien ab 19:30 Uhr in der ehemaligen Hildburgschule
  Rinteln. Mit rund 30 aktiven Musikerinnen und Musikern prägt das SBO seit 1986 die
  sinfonische Blasmusik in der Region.

