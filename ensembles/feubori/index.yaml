description: |
  Das Blasorchester Feuerwehr Rinteln (auch bekannt als »Feubori«) war ein
  Blasorchester der Freiwilligen Feuerwehr Rinteln. Das Ensemble spielte bis
  zuletzt unter dem Dirigenten Markus Plachta, das letzte dokumentierte Konzert
  fand im Mai 2016 statt.
  Ein Jugendensemble des Vereins, die »Feubori Kids«, wurde von Angela Voges geleitet.
  2008 nahm das Ensemble die CD »Wasser… marsch!« auf,
  welche zum Kassenschlager bei lokalen Auftritten wurde.  

