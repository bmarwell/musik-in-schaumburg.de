description: >
  Der Männerchor Schaumburg von 1946 e.V. war ein im Landkreis Schaumburg
  verwurzelter Männerchor, der seinen aktiven Singbetrieb inzwischen eingestellt hat.
  Der Chor blickt auf eine jahrzehntelange Geschichte in der Schaumburger Musiklandschaft
  zurück.

