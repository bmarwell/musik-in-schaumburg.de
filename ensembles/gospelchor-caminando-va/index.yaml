description: >
  »Caminando Va« – der Gospelchor der St. Jacobi Kirchengemeinde Rodenberg – besteht
  seit 1986 und gehört damit zu den erfahrensten Gospelchören der Region Schaumburg.
  Das Repertoire umfasst traditionelle Gospels ebenso wie zeitgenössische Worship-Songs.
  Der Chor tritt regelmäßig zu Adventssingen, Gospelgottesdiensten und anderen
  kirchlichen Veranstaltungen auf und arbeitet gelegentlich mit Gastsolisten und
  befreundeten Chören zusammen.

