title: "BBC Schaumburg Philharmonics Orchestra"
type: orchestra
slug: bbc-schaumburg-philharmonics-orchestra

description: |
  Das BBC Schaumburg Philharmonics Orchestra ist das erste Ensemble des im Jahreswechsel 2024/25 gegründeten
  Kultur- und Musikvereins Big Bands Company Schaumburg e.V.
  Mit rund 40 Musikerinnen und Musikern – darunter viele studierte Profis,
  Musiklehrer und Studenten der Hochschule Hannover – widmet sich das Orchester
  vor allem der romantischen Klassik in eigenen Arrangements.
  
  Unter der Leitung des spanischen Dirigenten José Pascual García Llopis hat das junge Ensemble
  in kurzer Zeit bereits mehrere erfolgreiche Konzerte gegeben und bereichert das kulturelle Leben in der Region.

