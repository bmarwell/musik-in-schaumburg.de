description: |
  Die Jagd- und Alphornbläser Loccum pflegen eine traditionsreiche Musikkultur 
  auf reinen Naturinstrumenten wie dem Fürst-Pless- und dem Parforcehorn. 
  Das Repertoire hat sich über die Jahrzehnte von ursprünglichen Jagdsignalen 
  hin zu anspruchsvollen konzertanten Vortragsstücken entwickelt, 
  die weit über das rein Waidmännische hinausgehen. 
  Eine absolute Besonderheit des Ensembles ist das Alphornblasen, 
  welches in norddeutschen Breitengraden ein echtes Alleinstellungsmerkmal darstellt. 
  Der Verein verbindet ein aktives Gemeinschaftsleben mit der Leidenschaft 
  für die Naturtonmusik und lädt Interessierte regelmäßig dazu ein, 
  diese besondere Klangwelt bei Auftritten in der Region kennenzulernen.

