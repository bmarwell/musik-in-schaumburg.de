description: >
  Die Jacobinis sind ein Kinderchor der Sankt-Jacobi Kirchengemeinde in Rodenberg.
  Gegründet wurde das Ensemble 2013 von sechs musikbegeisterten Frauen, die für ihre Kinder
  ein Angebot zum gemeinsamen Singen schaffen wollten. Ohne formale musikpädagogische
  Ausbildung, dafür mit viel Engagement und Kreativität, bauten sie den Chor von Grund auf auf.
  Heute leitet Judith Schlupp die Proben mit großem musikalischem Geschick; sie schloss 2019
  eine Ausbildung zur Atem-, Sprech- und Stimmlehrerin an der Schlaffhorst-Andersen-Schule
  in Bad Nenndorf ab. Petra Janßen sorgt für Bewegung und Organisation der Auftritte und
  begleitet die Kinder an Heimorgel und Cajón. Susanne Reese ergänzt das Team am Klavier
  und hilft den Kindern, Rhythmus und Melodie zu halten.

