description: |
  Der Spielmannszug Meinsen-Warber von 1955 e.V. wurde im Jahr 1955 von 23 jungen Männern
  in den Ortschaften Meinsen und Warber bei Bückeburg gegründet. Bereits ein halbes Jahr
  nach der Gründung trat der Zug erstmals öffentlich im Altkreis Schaumburg-Lippe auf –
  zunächst in enger Verbindung mit der örtlichen Feuerwehr und der Kyffhäuserkameradschaft.
  Im Jahr 1961 trennte sich der Spielmannszug von diesen Vereinen und agiert seitdem
  eigenständig.

  1969 wurde ein Jugendzug ins Leben gerufen, der 1970 mit 18 Jungen und 3 Mädchen beim
  hiesigen Schützenfest seinen ersten Auftritt hatte und bis heute fester Bestandteil des
  Vereins ist. Die Eintragung ins Vereinsregister erfolgte 1982. Vorsitzende und
  Stabführerin des Ensembles ist Claudia Wacker.

