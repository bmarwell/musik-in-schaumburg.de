description: |
  Die Big Band Route 65 ist seit 2007 die feste Adresse 
  für mitreißende Big-Band-Musik in Schaumburg. 
  Unter der Leitung von Udo Schatz spielt das Ensemble swingende Klassiker von Count Basie, 
  Glenn Miller und Duke Ellington ebenso wie Evergreens, Oldies 
  und fröhliche „Happy Music“ im Stil von James Last.
  Der Name „Route 65“ ist eine charmante Anspielung auf die legendäre Route 66 
  und die Bundesstraße B65, die durch die Region führt.
  
  Mit einem breiten Repertoire von Swing und Latin über Pop 
  bis hin zu James-Last-Medleys sorgt die Big Band für beste Stimmung auf Konzerten, 
  Festen und Veranstaltungen aller Art. Die Band lebt von der Leidenschaft 
  und dem großen Engagement ihrer Musikerinnen und Musiker sowie treuer Förderer.

