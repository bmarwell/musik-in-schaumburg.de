description: >
  Die AkkordArbeiter sind ein A-cappella-Quintett aus Stadthagen, das seit 1985 gemeinsam
  musiziert. Das Ensemble besteht aus vier Sängern und einer Mezzosopranistin, die zugleich
  als Pianistin auftritt; gesungen wird fünfstimmig a cappella oder als Männerquartett mit
  Klavierbegleitung. Das vielseitige Repertoire reicht von Barbershop-Songs, Spirituals und
  irischen Folksongs über Popsongs und Schlager bis hin zu Werken aus Renaissance, Romantik
  und Moderne.

