description: |
  Der Gemischte Chor MEERMUSIK aus Hagenburg vereint über 30 Sängerinnen und Sänger 
  direkt am Steinhuder Meer und wird seit mehr als 25 Jahren von 
  Anette Wiborg geleitet. 
  Das Ensemble zeichnet sich durch ein breites, mehrsprachiges Repertoire aus, 
  das von Pop, Jazz und Musicals bis hin zu moderner und klassischer Kirchenmusik reicht. 
  Besondere Höhepunkte der Chorgeschichte markieren die Teilnahme 
  am Deutschen Jazzchorfestival sowie gefeierte Konzerte mit den Göttinger Symphonikern 
  in der Hagenburger Nicolai-Kirche. Die Gemeinschaft probt montags im evangelischen Gemeindehaus 
  und bereichert mit ihren Auftritten regelmäßig das kulturelle Leben sowie private Feierlichkeiten 
  in der gesamten Region.

