description: >
  Der Eisenbahnchor Haste e.V. wurde 1905 gegründet und blickt auf eine über 120-jährige
  Geschichte zurück. Mit rund 63 aktiven Mitgliedern ist er einer der traditionsreichsten
  Chöre im Landkreis Schaumburg. Unter der Leitung von Chorleiter Daniel Zebrowski pflegt
  der Chor ein vielfältiges Repertoire und tritt bei regionalen Veranstaltungen und
  Festen auf.

