description: >
  Der Posaunenchor Stadthagen gehört zur Kirchenmusik an St. Martini Stadthagen und begleitet
  Gottesdienste sowie besondere Veranstaltungen in der Gemeinde. Unter der Leitung von Michael
  Mensching probt das Ensemble mittwochs im Jakob-Dammann-Haus. Beim Projekt »Brass & Voices«
  erklang der Chor zuletzt gemeinsam mit über 100 Bläserinnen und Bläsern in der Martinikirche.

