description: >
  Die Schaumburger Trachtenkapelle wurde 1970 gegründet und ist eine feste Größe in der
  regionalen Volksmusikszene. In ihren traditionellen Schaumburger Trachten begleiten
  sie Festumzüge, Erntedankfeste und andere Veranstaltungen in der Region Schaumburg
  und darüber hinaus. Besonders bekannt sind sie als langjährige Stammkapelle beim
  Nammer Erntefest in Porta Westfalica, wo sie seit ihrer Gründung ohne Unterbrechung
  auftreten. Das Repertoire umfasst Blasmusikklassiker sowie volksmusikalische Stücke
  in der Tradition der Schaumburger Landschaft.

location: 'Bad Eilsen'

