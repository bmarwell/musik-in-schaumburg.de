description: |
  Das Drum & Music Corps Blue Bandits versteht sich als modernes Show-Ensemble, 
  das den klassischen Spielmannszug-Sound durch druckvolle Arrangements 
  aus Pop, Rock und Filmmusik ersetzt hat. Unter der musikalischen 
  Leitung von Mario Niehoff präsentiert die Formation energetische Choreografien, 
  die in den markanten blau-schwarzen Uniformen ein optisches und akustisches 
  Highlight bei regionalen Events wie dem Schützenfest darstellen. 
  Auf ihrer Webseite blue-bandits.de gibt der Verein Einblicke 
  in sein aktives Vereinsleben und das Repertoire, das weit über die Grenzen 
  der Samtgemeinde Sachsenhagen hinaus bekannt ist. 
  Seit über 20 Jahren beweist das Corps eindrucksvoll, wie lebendig und zeitgemäß 
  Marschmusik am Steinhuder Meer heute interpretiert werden kann.

