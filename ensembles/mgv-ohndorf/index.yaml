description: >
  Der Männergesangverein Ohndorf e.V. wurde 1922 gegründet und war über Jahrzehnte
  ein fester Bestandteil des kulturellen Lebens im Dorf Ohndorf. Als Mitglied des
  Sängerbundes Deister-Süntel pflegte der Verein das klassische Männerchorlied und
  trat bei Dorf- und Kirchenfesten sowie Gemeinschaftsveranstaltungen benachbarter
  Chöre auf. Aufgrund stetig sinkender Mitgliederzahlen musste der Verein im Dezember
  2023 aufgelöst werden.

