description: >
  Die Schaumburger Märchensänger wurden 1948 gegründet und erlangten weltweiten
  Ruhm durch das Lied „Mein Vater war ein Wandersmann". Der Konzertchor richtet
  sich an Jugendliche von 12 bis 24 Jahren und pflegt als vierstimmig gemischter
  Chor ein breites Repertoire – von der Renaissance bis zur zeitgenössischen
  Musik, ergänzt durch Volkslieder, Jazz und Pop. Neue Mitglieder sind stets
  willkommen; eine Probeprobe ist nach telefonischer Absprache möglich.

