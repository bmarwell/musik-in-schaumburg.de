description: >
  Der Posaunenchor Frille gehört zur Evangelisch-Lutherischen Kirchengemeinde Frille,
  die zwar verwaltungstechnisch zur Stadt Minden (NRW) zählt, kirchlich aber zur
  Landeskirche Schaumburg-Lippe gehört – ebenso wie die benachbarte Gemeinde Cammer
  im Landkreis Schaumburg.
  Seit seiner Gründung im Jahr 1907 begleitet der Chor Gottesdienste in und außerhalb
  der Kirche sowie Gemeindeveranstaltungen wie das Friller Erntefest, den Laternenumzug
  der Grundschule und Gedenkfeiern am Volkstrauertag.
  Das Repertoire reicht von Kirchen- und Volksmusik über klassische Instrumentalstücke
  bis hin zu zeitgenössischen Stücken mit Einflüssen aus Swing und Filmmusik.
  Ein besonderes Highlight in der Vereinsgeschichte war das Jahr 2007: Anlässlich des
  100-jährigen Bestehens richtete der Chor das Schaumburg-Lippische Landesposaunenfest aus,
  an dem 120 Bläserinnen und Bläser aus 14 Chören teilnahmen.
  Seit 2021 leitet Claes Barthold den Chor mit derzeit rund 12 aktiven Bläserinnen
  und Bläsern. Alle zwei Jahre werden neue Jungbläser ausgebildet; mitmachen können
  Kinder ab der 3. Klasse sowie Jugendliche und Erwachsene – Vorkenntnisse sind nicht
  erforderlich, die Ausbildung ist kostenlos. Auch erfahrene Bläserinnen und Bläser
  sind herzlich willkommen.

