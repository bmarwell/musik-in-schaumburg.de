description: >
  Der HeartChor Schaumburg singt Rock, Pop, Musical und Evergreens – und noch viel mehr!
  Chorleiterin Julia Knubbe lädt alle Gesangsbegeisterten herzlich ein, auch ohne Vorkenntnisse
  in die Proben reinzuschnuppern. Zwei kostenlose und unverbindliche Probestunden sind jederzeit
  möglich. Der Chor tritt regelmäßig bei Konzerten in der Region auf.

