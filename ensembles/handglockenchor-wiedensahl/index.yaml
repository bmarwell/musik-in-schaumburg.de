description: >
  Der Handglockenchor Wiedensahl präsentiert seit 1987 Handglockenmusik aus der ev.-luth.
  Kirchengemeinde Wiedensahl. Mit über 100 Handglocken und 61 Tonstäben gehört das Ensemble zu
  den größten seiner Art in Europa und wurde viermal in Folge beim Deutschen Orchesterwettbewerb
  ausgezeichnet. Die Glöcknerinnen und Glöckner treten bei Konzerten, Festivals und Reisen im In-
  und Ausland auf.

