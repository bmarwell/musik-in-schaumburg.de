description: |
  Der 1869 gegründete Posaunenchor Steinhuder Meer – Großenheidorn ist der älteste Posaunenchor 
  der Schaumburg-Lippischen Landeskirche und eines der 
  traditionsreichsten Blechbläserensembles der Region.
  Obwohl Großenheidorn und Steinhude geografisch zur Region Hannover gehören, 
  ist der Chor seit seiner Gründung eng mit den Kirchengemeinden 
  der Landeskirche Schaumburg-Lippe verbunden und bereichert das kirchliche 
  und kulturelle Leben im weiteren Schaumburger Raum.
  Seine besondere Stärke liegt in der generationenübergreifenden Gemeinschaft 
  von Bläserinnen und Bläsern zwischen 10 und über 80 Jahren, 
  der eigenen Jungbläserausbildung sowie regelmäßigen Workshops und 
  Kooperationen mit renommierten Ensembles wie Harmonic Brass.

