description: >
  Der Posaunenchor Bad Nenndorf wurde am 21. Januar 1913 unter dem Namen »Posaunenchor Kreuzriehe«
  in Kreuzriehe – heute ein Ortsteil im Umfeld von Bad Nenndorf – gegründet. Er gehört zur
  evangelischen St.-Godehardi-Gemeinde Bad Nenndorf und begleitet seit über 110 Jahren Gottesdienste,
  Kirchenfeste und besondere Veranstaltungen musikalisch. Im Laufe seiner Geschichte trug das
  Ensemble verschiedene Namen; seit der Eingliederung in die Kirchengemeinde firmiert es als
  Posaunenchor der Gemeinde Bad Nenndorf. Heute probt das Ensemble jeden Dienstag im
  Haus der Begegnung und freut sich über Nachwuchs.

