<header class="site-header"{{#isHomepage}} itemscope itemtype="https://schema.org/WebSite"{{/isHomepage}}>
  <div class="site-header-bg" aria-hidden="true">
    <picture>
      <source type="image/webp" srcset="{{{headerImgRoot}}}img/header-schaumburg.webp">
      <img src="{{{headerImgRoot}}}img/header-schaumburg.jpg" alt="" width="1156" height="737" fetchpriority="high" loading="eager">
    </picture>
  </div>
  <div class="container">
    <h1{{#isHomepage}} itemprop="name"{{/isHomepage}}>🎵 Musik in Schaumburg</h1>
    <p class="tagline">Musikensembles, Chöre und Blasorchester im Landkreis Schaumburg, Niedersachsen</p>
  </div>
  <p class="site-header-attribution">
    <a href="https://commons.wikimedia.org/wiki/File:Paschenburg_und_Schaumburg_von_unten.jpg" rel="noopener noreferrer" target="_blank">Foto: Norbert Schnitzler, CC BY-SA 3.0 DE</a>
  </p>
</header>
